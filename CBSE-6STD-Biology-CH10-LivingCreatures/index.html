<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Interactive Mind Map – Grade 6 Biology Chapter 10</title>
    <meta name="description"
        content="Interactive Mind Map for NCERT Grade 6 Biology Chapter 10: Living Creatures: Exploring their Characteristics. Explore subtopics, micro-concepts, examples and keywords.">
    <link
        href="https://fonts.googleapis.com/css2?family=Merriweather:wght@400;700&family=Noto+Sans:wght@400;500;600;700&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <!-- Floating particles background -->
    <div class="particles" id="particles"></div>

    <!-- Header / Toolbar -->
    <header class="toolbar" id="toolbar">
        <div class="toolbar-left">
            <div class="logo">🧬</div>
            <div class="toolbar-title">
                <h1>Grade 6 Biology – Chapter 10</h1>
                <span class="toolbar-subtitle">Interactive Mind Map</span>
            </div>
        </div>
        <div class="toolbar-right">
            <button class="btn-tool" id="btnTheme" title="Toggle Theme">
                <!-- Sun icon (shown in dark mode to switch to light) -->
                <svg class="icon-sun" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <circle cx="12" cy="12" r="5"/>
                    <line x1="12" y1="1" x2="12" y2="3"/>
                    <line x1="12" y1="21" x2="12" y2="23"/>
                    <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/>
                    <line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/>
                    <line x1="1" y1="12" x2="3" y2="12"/>
                    <line x1="21" y1="12" x2="23" y2="12"/>
                    <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/>
                    <line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/>
                </svg>
                <!-- Moon icon (shown in light mode to switch to dark) -->
                <svg class="icon-moon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>
                </svg>
                <span>Theme</span>
            </button>
            <button class="btn-tool" id="btnExpandAll" title="Expand All">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M15 3h6v6M9 21H3v-6M21 3l-7 7M3 21l7-7" />
                </svg>
                <span>Expand All</span>
            </button>
            <button class="btn-tool" id="btnCollapseAll" title="Collapse All">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M4 14h6v6M14 4h6v6M20 10l-7-7M4 20l7-7" />
                </svg>
                <span>Collapse</span>
            </button>
            <button class="btn-tool" id="btnReset" title="Reset View">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <circle cx="12" cy="12" r="3" />
                    <path d="M12 2a10 10 0 0 1 10 10" />
                    <path d="M12 22a10 10 0 0 1-10-10" />
                    <path d="M22 12h-4M2 12h4" />
                </svg>
                <span>Reset</span>
            </button>
        </div>
    </header>

    <!-- Main Mind Map Container -->
    <div class="mindmap-viewport" id="mindmapViewport">
        <div class="mindmap-canvas" id="mindmapCanvas">
            <!-- SVG layer for connections -->
            <svg class="connections-layer" id="connectionsLayer"></svg>
            <!-- Nodes will be generated by JS -->
        </div>
    </div>

    <!-- Detail Panel (slide-in) -->
    <div class="detail-panel" id="detailPanel">
        <button class="detail-close" id="detailClose">✕</button>
        <div class="detail-content" id="detailContent"></div>
    </div>

    <!-- Quiz Modal -->
    <div class="quiz-overlay" id="quizOverlay">
        <div class="quiz-modal" id="quizModal">
            <button class="quiz-close" id="quizClose">✕</button>
            <div class="quiz-content" id="quizContent"></div>
        </div>
    </div>

    <!-- Toast notifications -->
    <div class="toast-container" id="toastContainer"></div>

    <script src="mindmap-data.js"></script>
    <script src="mindmap.js"></script>
</body>

</html>
